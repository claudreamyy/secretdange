<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Shop | Secret d'Ange</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a1a;
            --gold: #D4AF37;
            --gold-light: #f4e9c1;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
            --radius-lg: 24px;
            --radius-md: 12px;
        }

        body {
            font-family: var(--font-sans);
            background-color: #ffffff;
            color: var(--primary);
            overflow-x: hidden;
        }

        h1, h2, h3, .serif { font-family: var(--font-serif); }
        .gold-text { color: var(--gold); }
        .gold-bg { background-color: var(--gold); }
        .gold-border { border-color: var(--gold); }

        .header-glass {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #f0f0f0;
        }

        .product-card {
            border-radius: var(--radius-lg);
            background: #fff;
            transition: all 0.5s ease;
        }

        .product-card .img-container {
            border-radius: var(--radius-lg);
            overflow: hidden;
            position: relative;
        }

        .product-card img {
            transition: transform 1.2s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .product-card:hover img { transform: scale(1.1); }
        .product-card:hover { transform: translateY(-5px); }

        .btn-gold {
            background-color: var(--gold);
            color: white;
            transition: all 0.4s ease;
            border-radius: var(--radius-md);
        }

        .btn-gold:hover {
            background-color: #b8962e;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        #side-cart {
            transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .cart-open #side-cart { transform: translateX(0); }

        .overlay {
            display: none;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        .cart-open .overlay { display: block; }
        .category-pill.active { background-color: var(--gold); color: white; }
    </style>
</head>
<body class="antialiased">

    <div id="overlay" class="overlay fixed inset-0 z-40 transition-opacity" onclick="toggleCart()"></div>

    <!-- Panier Latéral -->
    <div id="side-cart" class="fixed top-0 right-0 h-full w-full sm:w-96 bg-white z-50 shadow-2xl translate-x-full flex flex-col">
        <div class="p-6 border-b flex justify-between items-center">
            <h2 class="text-xl font-semibold serif italic">Votre Sélection</h2>
            <button onclick="toggleCart()" class="text-2xl hover:gold-text">&times;</button>
        </div>
        <div class="flex-grow p-6 overflow-y-auto" id="cart-items">
            <p class="text-gray-400 text-center mt-10 italic text-sm">Le secret de votre beauté commence ici.</p>
        </div>
        <div class="p-6 border-t bg-gray-50">
            <div class="flex justify-between mb-4 font-semibold">
                <span>Total</span>
                <span id="cart-total" class="gold-text">0 FCFA</span>
            </div>
            <button onclick="checkoutWhatsApp()" class="w-full btn-gold py-4 uppercase text-xs tracking-[0.2em] font-bold">
                Commander via WhatsApp
            </button>
        </div>
    </div>

    <!-- Header -->
    <header class="header-glass sticky top-0 z-30 px-6 py-5 flex justify-between items-center">
        <nav class="hidden md:flex gap-8 text-[11px] uppercase tracking-[0.2em] font-medium">
            <a href="index.html" class="hover:gold-text transition">Accueil</a>
            <a href="shop.html" class="hover:gold-text transition gold-text">Shop</a>
            <a href="reservation.html" class="hover:gold-text transition">Réservation</a>
            <a href="contact.html" class="hover:gold-text transition">Contact</a>
        </nav>
        
        <div class="text-2xl md:text-3xl font-bold tracking-tighter uppercase serif text-center">
            Secret <span class="gold-text">d'Ange</span>
        </div>

        <div class="flex items-center gap-6">
            <button onclick="toggleCart()" class="relative hover:gold-text transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                <span id="cart-count" class="absolute -top-1 -right-2 gold-bg text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
            </button>
        </div>
    </header>

    <main class="py-20">
        <section class="container mx-auto px-6">
            <div class="text-center mb-16">
                <h1 class="text-5xl md:text-6xl mb-4 serif">Le <span class="italic">Shop</span> de l'Ange</h1>
                <p class="text-gray-400 uppercase tracking-[0.3em] text-[10px] font-bold">Découvrez tous nos trésors de beauté</p>
                
                <div class="mt-12 flex flex-col md:flex-row gap-6 justify-center items-center">
                    <div class="relative w-full max-w-md">
                        <input type="text" id="search-input" oninput="handleSearch()" placeholder="Rechercher un produit..." class="w-full px-8 py-4 rounded-full border border-gray-100 text-sm focus:outline-none focus:border-gold transition-all shadow-sm">
                    </div>
                    <div id="category-pills" class="flex flex-wrap justify-center gap-2">
                        <!-- Rempli dynamiquement -->
                    </div>
                </div>
            </div>

            <div id="shop-grid" class="shop-grid">
                <!-- Rempli par JS -->
            </div>

            <div id="see-more-container" class="mt-20 text-center hidden">
                <button onclick="showMore()" class="btn-gold px-12 py-5 text-xs uppercase tracking-widest">
                    Voir plus de produits
                </button>
            </div>
        </section>
    </main>

    <footer class="bg-white border-t border-gray-100 pt-24 pb-12">
        <div class="container mx-auto px-6 text-center">
            <div class="text-3xl font-bold uppercase serif mb-8 tracking-widest">
                Secret <span class="gold-text">d'Ange</span>
            </div>
            <div class="flex flex-wrap justify-center gap-10 mb-16 text-[10px] uppercase tracking-[0.2em] font-medium text-gray-400">
                <a href="index.html" class="hover:gold-text transition">Accueil</a>
                <a href="shop.html" class="hover:gold-text transition">Boutique</a>
                <a href="reservation.html" class="hover:gold-text transition">Réservation</a>
                <a href="contact.html" class="hover:gold-text transition">Contact</a>
            </div>
            <div class="text-[10px] text-gray-400 uppercase tracking-widest border-t border-gray-50 pt-12">
                <p>&copy; 2024 Secret d'Ange Togo • Nyékonakpoé, Lomé • Beauté Divine.</p>
            </div>
        </div>
    </footer>

    <script>
        let products = [];
        let categories = ["Visage", "Corps", "Cheveux", "Parfum"];
        let cart = [];
        let currentFilter = 'Tous';
        let searchQuery = '';
        let displayLimit = 12;

        const cartCount = document.getElementById('cart-count');
        const cartItems = document.getElementById('cart-items');
        const cartTotal = document.getElementById('cart-total');

        function toggleCart() { document.body.classList.toggle('cart-open'); }

        function handleSearch() {
            searchQuery = document.getElementById('search-input').value.toLowerCase();
            renderProducts();
        }

        function filterCategory(cat) {
            currentFilter = cat;
            displayLimit = 12;
            renderFilters();
            renderProducts();
        }

        function renderFilters() {
            const pills = document.getElementById('category-pills');
            const allCats = ['Tous', ...categories];

            pills.innerHTML = allCats.map(cat => `
                <button onclick="filterCategory('${cat}')" class="category-pill ${currentFilter === cat ? 'active' : ''} px-6 py-2.5 rounded-full border text-[10px] uppercase tracking-widest font-bold transition-all">
                    ${cat}
                </button>
            `).join('');
        }

        function renderProducts() {
            const grid = document.getElementById('shop-grid');
            const seeMoreContainer = document.getElementById('see-more-container');
            
            const filtered = products.filter(p => {
                const matchesCat = currentFilter === 'Tous' ? true : p.category === currentFilter;
                const matchesSearch = p.name.toLowerCase().includes(searchQuery);
                return matchesCat && matchesSearch;
            });

            const displayed = filtered.slice(0, displayLimit);

            grid.innerHTML = displayed.map(p => `
                <div class="product-card group bg-white p-4">
                    <div class="img-container aspect-square mb-6">
                        <img src="img/${p.img}" alt="${p.name}" class="w-full h-full object-cover">
                        <button onclick="addToCart('${p.name}', ${p.price}, '${p.img}')" class="absolute bottom-0 left-0 w-full btn-gold py-4 translate-y-full group-hover:translate-y-0 transition-transform duration-500 text-xs uppercase tracking-widest font-bold rounded-none">
                            + Ajouter au panier
                        </button>
                    </div>
                    <div class="text-center px-2">
                        <h3 class="text-xs uppercase tracking-widest mb-1 font-bold">${p.name}</h3>
                        <p class="text-gray-400 text-[10px] mb-3 italic">${p.category}</p>
                        <p class="font-bold gold-text text-lg">${p.price.toLocaleString()} FCFA</p>
                    </div>
                </div>
            `).join('');

            if (filtered.length > displayLimit) {
                seeMoreContainer.classList.remove('hidden');
            } else {
                seeMoreContainer.classList.add('hidden');
            }
        }

        function showMore() {
            displayLimit += 12;
            renderProducts();
        }

        function addToCart(name, price, img) {
            let cart = JSON.parse(localStorage.getItem('secret_cart')) || [];
            const existing = cart.find(item => item.name === name);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ name, price, img, quantity: 1 });
            }
            localStorage.setItem('secret_cart', JSON.stringify(cart));
            updateCart();
            if(!document.body.classList.contains('cart-open')) toggleCart();
        }

        function updateCart() {
            const cart = JSON.parse(localStorage.getItem('secret_cart')) || [];
            cartCount.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<p class="text-gray-400 text-center mt-10 italic text-sm">Votre panier est vide.</p>';
            } else {
                cartItems.innerHTML = cart.map((item, index) => `
                    <div class="flex justify-between items-center mb-6 pb-6 border-b border-gray-50 group">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-lg bg-gray-50 overflow-hidden">
                                <img src="img/${item.img || 'wave.png'}" class="w-full h-full object-cover">
                            </div>
                            <div>
                                <p class="text-[10px] font-bold uppercase tracking-widest mb-1">${item.name}</p>
                                <p class="text-sm gold-text font-semibold">${item.price.toLocaleString()} FCFA</p>
                            </div>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                            <div class="flex items-center border rounded-lg overflow-hidden border-gray-100">
                                <button onclick="changeQty('${item.name}', -1)" class="px-2 py-1 hover:bg-gray-50 text-xs select-none">-</button>
                                <span class="px-3 text-xs font-bold">${item.quantity}</span>
                                <button onclick="changeQty('${item.name}', 1)" class="px-2 py-1 hover:bg-gray-50 text-xs select-none">+</button>
                            </div>
                            <button onclick="removeItem('${item.name}')" class="text-[9px] uppercase tracking-tighter text-gray-300 hover:text-red-500 transition">Supprimer</button>
                        </div>
                    </div>
                `).join('');
            }
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotal.textContent = total.toLocaleString() + ' FCFA';
        }

        function changeQty(name, delta) {
            let cart = JSON.parse(localStorage.getItem('secret_cart')) || [];
            const item = cart.find(i => i.name === name);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.name !== name);
                }
                localStorage.setItem('secret_cart', JSON.stringify(cart));
                updateCart();
            }
        }

        function removeItem(name) {
            let cart = JSON.parse(localStorage.getItem('secret_cart')) || [];
            cart = cart.filter(i => i.name !== name);
            localStorage.setItem('secret_cart', JSON.stringify(cart));
            updateCart();
        }

        function checkoutWhatsApp() {
            const cart = JSON.parse(localStorage.getItem('secret_cart')) || [];
            if(cart.length === 0) return;
            let message = "Bonjour Secret d'Ange, je souhaite commander :\n\n";
            cart.forEach(item => {
                message += `• ${item.quantity}x ${item.name} (${(item.price * item.quantity).toLocaleString()} FCFA)\n`;
            });
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            message += `\nTotal : ${total.toLocaleString()} FCFA`;
            window.open(`https://wa.me/22890000000?text=${encodeURIComponent(message)}`, '_blank');
        }

        window.onload = async () => {
            try {
                updateCart();
                const resp = await fetch('products.json', { cache: 'no-store' });
                if (resp.ok) products = await resp.json();
                
                const actualCats = [...new Set(products.map(p => p.category))].filter(c => c);
                if(actualCats.length > 0) categories = actualCats;

                renderFilters();
                renderProducts();
            } catch (e) {
                console.error(e);
            }
        };
    </script>
</body>
</html>
